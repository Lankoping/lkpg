services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lankoping-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      # High-performance asset loading (optional config)
      - ASSET_PRELOAD_MAX_SIZE=5242880
      - ASSET_PRELOAD_ENABLE_GZIP=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
