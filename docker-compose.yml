services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lankoping-web
    restart: always
    expose:
      - "3000"
    environment:
      - PORT=3000
      - NITRO_HOST=0.0.0.0
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
